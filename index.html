<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Ali Cafe - Guindy | Smart Order Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #d48a50, #f7d8ba);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* MAIN WRAPPER */
    .menu-wrapper {
      width: 100%;
      max-width: 1250px;
      margin: 0 auto;
      background: #f8efe4;
      border-radius: 30px 30px 0 0;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .menu-wrapper::before {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      background: #6d2f0d;
      border-radius: 50%;
      top: -120px;
      left: -120px;
      opacity: 0.12;
      pointer-events: none;
    }

    /* FIXED NAVBAR - IMPROVED */
    .fixed-navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #4a1d08;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      padding: 10px 16px;
    }

    .nav-container {
      max-width: 1250px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nav-logo {
      color: white;
      font-weight: 800;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.12);
      padding: 5px 12px;
      border-radius: 40px;
      white-space: nowrap;
    }

    .nav-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      background: white;
      border-radius: 40px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .search-box input {
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      width: 100px;
      background: transparent;
    }

    .category-dropdown select {
      padding: 8px 14px;
      border-radius: 40px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      background: white;
      color: #4a1d08;
      cursor: pointer;
      font-size: 0.8rem;
      min-width: 100px;
    }

    .order-badge {
      background: #f4a460;
      color: #4a1d08;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 92px;
      justify-content: center;
    }

    /* HERO SECTION - FIXED VISIBILITY */
    .hero-header {
      background: #4a1d08;
      color: white;
      text-align: center;
      padding: 20px 16px 22px;
      position: relative;
      margin-top: 0;
    }

    .hero-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.25;
      word-break: break-word;
    }

    .hero-header p {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .hero-header::before {
      content: '☕';
      position: absolute;
      left: 12px;
      top: 12px;
      font-size: 40px;
      opacity: 0.12;
    }

    .hero-header::after {
      content: '🍔';
      position: absolute;
      right: 12px;
      top: 12px;
      font-size: 40px;
      opacity: 0.12;
    }

    /* ACTIVE CATEGORY BANNER */
    .active-category-banner {
      background: #f4a460;
      padding: 10px 16px;
      text-align: center;
      font-weight: 700;
      color: #4a1d08;
      font-size: 0.9rem;
      border-bottom: 2px solid #e08e3a;
    }

    .active-category-banner span {
      background: #4a1d08;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      margin-left: 8px;
    }

    /* MENU CONTENT - DYNAMIC ORDER */
    .menu-content {
      padding: 25px;
      background: #f8efe4;
    }

    .menu-section {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.8rem;
      color: #4a1d08;
      margin-bottom: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .food-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 22px;
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .category-image {
      height: 220px;
      display: block;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
    }

    .category-group {
      margin-bottom: 30px;
    }

    .category-group h3 {
      color: #8b4513;
      margin-bottom: 12px;
      font-size: 1.25rem;
      padding-left: 12px;
      border-left: 5px solid #d48a50;
      font-weight: 700;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.15);
      flex-wrap: wrap;
      gap: 8px;
    }

    .item-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .price {
      color: #4a1d08;
      font-weight: 700;
      background: #f6dfc7;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .add-to-cart {
      background: #4a1d08;
      color: white;
      border: none;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* CART PANEL WITH QUANTITY */
    .order-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 340px;
      max-width: calc(100% - 40px);
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
      z-index: 1050;
      transition: 0.25s ease;
    }

    .order-header {
      background: #4a1d08;
      color: white;
      padding: 14px 18px;
      border-radius: 28px 28px 0 0;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .order-list {
      max-height: 350px;
      overflow-y: auto;
      padding: 12px;
      background: #fff9f2;
      border-radius: 0 0 20px 20px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px;
      border-bottom: 1px solid #f0e0d0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cart-item-details {
      flex: 2;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .cart-item-price {
      font-weight: 700;
      color: #4a1d08;
      font-size: 0.85rem;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0e0d0;
      padding: 4px 10px;
      border-radius: 30px;
    }

    .qty-btn {
      background: #4a1d08;
      color: white;
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .qty-num {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }

    .total-row {
      font-weight: 800;
      background: #f7e5d4;
      padding: 12px;
      border-radius: 20px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .empty-msg {
      text-align: center;
      color: #a07a5c;
      padding: 20px;
    }

    .footer {
      background: #4a1d08;
      color: white;
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
    }

    .top-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #4a1d08;
      color: white;
      border: none;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
      z-index: 1000;
    }

    .top-btn.show {
      opacity: 1;
      visibility: visible;
    }

    /* RESPONSIVE FIXES - ULTRA SMALL */
    @media (max-width: 850px) {
      .nav-container {
        flex-direction: column;
        align-items: stretch;
      }
      .nav-controls {
        justify-content: space-between;
        width: 100%;
      }
      .search-box,
      .category-dropdown,
      .order-badge {
        flex: 1 1 auto;
        min-width: 0;
      }
      .category-dropdown select,
      .search-box input {
        width: 100%;
      }
      .order-badge {
        justify-content: center;
      }
    }

    @media (max-width: 700px) {
      .menu-item {
        flex-direction: column;
        align-items: stretch;
      }
      .item-info {
        width: 100%;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .add-to-cart {
        width: auto;
        align-self: flex-start;
        padding: 6px 12px;
        font-size: 0.75rem;
        margin-top: 6px;
      }
      .category-image {
        height: 180px;
      }
    }

    @media (max-width: 550px) {
      body {
        padding-top: 120px;
      }
      .fixed-navbar {
        padding: 8px 12px;
      }
      .nav-controls {
        gap: 10px;
      }
      .hero-header {
        padding: 14px 12px 18px;
        margin-top: 8px;
      }
      .hero-header h1 {
        font-size: 1.3rem;
      }
      .hero-header p {
        font-size: 0.7rem;
      }
      .category-dropdown select {
        padding: 9px 14px;
        font-size: 0.82rem;
      }
      .order-badge {
        padding: 9px 15px;
        font-size: 0.82rem;
      }
      .menu-content {
        padding: 15px;
      }
      .menu-section {
        padding: 16px;
      }
      .section-title {
        font-size: 1.4rem;
      }
      .category-group h3 {
        font-size: 1rem;
      }
      .category-image {
        height: 150px;
      }
      .item-name {
        font-size: 0.85rem;
      }
      .price {
        font-size: 0.75rem;
      }
      .add-to-cart {
        padding: 5px 10px;
        font-size: 0.72rem;
      }
      .order-panel {
        width: 290px;
        right: 10px;
        bottom: 10px;
      }
    }

    @media (max-width: 420px) {
      body {
        padding-top: 135px;
      }
      .hero-header {
        margin-top: 10px;
      }
      .add-to-cart {
        padding: 5px 10px;
        font-size: 0.7rem;
      }
    }

    @media (max-width: 320px) {
      body {
        padding-top: 150px;
      }
      .hero-header {
        margin-top: 12px;
      }
      .add-to-cart {
        padding: 4px 10px;
        font-size: 0.68rem;
      }
    }

    @media (max-width: 380px) {
      body {
        padding-top: 120px;
      }
      .hero-header h1 {
        font-size: 1.1rem;
      }
      .nav-logo {
        font-size: 0.8rem;
      }
      .search-box input {
        width: 75px;
      }
      .category-dropdown select {
        font-size: 0.72rem;
        padding: 6px 10px;
        min-width: 88px;
      }
      .order-badge {
        font-size: 0.72rem;
        padding: 6px 10px;
        min-width: 88px;
      }
      .active-category-banner {
        font-size: 0.75rem;
        padding: 8px 12px;
      }
      .active-category-banner span {
        font-size: 0.65rem;
      }
      .menu-content {
        padding: 12px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="fixed-navbar">
  <div class="nav-container">
    <div class="nav-logo">☕ Ali Cafe Guindy</div>
    <div class="nav-controls">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search...">
      </div>
      <div class="category-dropdown">
        <select id="categoryFilterSelect">
          <option value="all">📋 All</option>
          <option value="Tea Varieties">🍃 Tea</option>
          <option value="Coffee">☕ Coffee</option>
          <option value="Milkshakes">🥤 Shakes</option>
          <option value="Snacks">🍟 Snacks</option>
          <option value="Sandwich">🥪 Sandwich</option>
          <option value="Ice Cream">🍨 Ice Cream</option>
        </select>
      </div>
      <div class="order-badge" id="openOrderPanelBtn">🛒 <span id="cartCount">0</span></div>
    </div>
  </div>
</div>

<div class="menu-wrapper">
  <div class="hero-header">
    <h1>☕ Ali Cafe 🍔 Guindy 🍨</h1>
    <p>Freshly Brewed Happiness & Delicious Snacks</p>
  </div>

  <div class="active-category-banner" id="activeCategoryBanner">
    🍽️ Currently viewing: <span id="selectedCategoryName">All Items</span>
  </div>

  <div class="menu-content" id="menuContainer"></div>

  <div class="footer">
    <p>☕ <strong>Ali Cafe</strong> - Freshly Brewed Happiness ☕</p>
    <p>📍 Guindy | 📞 +91 9876543210</p>
  </div>
</div>

<div class="order-panel" id="orderPanel">
  <div class="order-header" id="toggleOrderPanel">
    <span>📋 Your Order</span>
    <span>🛒</span>
  </div>
  <div class="order-list" id="orderListContainer">
    <div class="empty-msg">Cart is empty</div>
  </div>
</div>

<button class="top-btn" id="topBtn">↑</button>

<script>
  // MASTER MENU DATA
  const menuData = [
    { name: "Classic Tea", price: 15, category: "Tea Varieties", section: "Beverages" },
    { name: "Strong Tea", price: 20, category: "Tea Varieties", section: "Beverages" },
    { name: "Ginger Tea", price: 20, category: "Tea Varieties", section: "Beverages" },
    { name: "Cardamom Tea", price: 20, category: "Tea Varieties", section: "Beverages" },
    { name: "Special Masala Tea", price: 25, category: "Tea Varieties", section: "Beverages" },
    { name: "Filter Coffee", price: 25, category: "Coffee", section: "Beverages" },
    { name: "Black Coffee", price: 20, category: "Coffee", section: "Beverages" },
    { name: "Chocolate Shake", price: 80, category: "Milkshakes", section: "Beverages" },
    { name: "Vanilla Shake", price: 70, category: "Milkshakes", section: "Beverages" },
    { name: "Strawberry Shake", price: 80, category: "Milkshakes", section: "Beverages" },
    { name: "Oreo Shake", price: 90, category: "Milkshakes", section: "Beverages" },
    { name: "French Fries", price: 70, category: "Snacks", section: "Snacks & Desserts" },
    { name: "Peri Peri Fries", price: 80, category: "Snacks", section: "Snacks & Desserts" },
    { name: "Veg Sandwich", price: 60, category: "Sandwich", section: "Snacks & Desserts" },
    { name: "Egg Sandwich", price: 70, category: "Sandwich", section: "Snacks & Desserts" },
    { name: "Chicken Sandwich", price: 90, category: "Sandwich", section: "Snacks & Desserts" },
    { name: "Vanilla Scoop", price: 40, category: "Ice Cream", section: "Snacks & Desserts" },
    { name: "Chocolate Scoop", price: 50, category: "Ice Cream", section: "Snacks & Desserts" },
    { name: "Butterscotch", price: 50, category: "Ice Cream", section: "Snacks & Desserts" },
    { name: "Ice Cream Sundae", price: 90, category: "Ice Cream", section: "Snacks & Desserts" }
  ];

  const categoryImages = {
    "Tea Varieties": "https://images.unsplash.com/photo-1544787219-7f47ccb76574?q=80&w=600&auto=format",
    "Coffee": "https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=600&auto=format",
    "Milkshakes": "https://images.unsplash.com/photo-1577805947697-89e18249d767?q=80&w=600&auto=format",
    "Snacks": "https://images.unsplash.com/photo-1639024471283-03518883512d?q=80&w=600&auto=format",
    "Sandwich": "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8c2FuZHdpY2h8ZW58MHx8MHx8fDA%3D",
    "Ice Cream": "https://images.unsplash.com/photo-1567206563064-6f60f40a2b57?q=80&w=600&auto=format"
  };

  function getCategoryImage(category) {
    return categoryImages[category] || "https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=600&auto=format";
  }

  const menuContainer = document.getElementById('menuContainer');
  const categorySelect = document.getElementById('categoryFilterSelect');
  const searchInput = document.getElementById('searchInput');
  const selectedCategorySpan = document.getElementById('selectedCategoryName');
  const cartCountSpan = document.getElementById('cartCount');
  const orderListContainer = document.getElementById('orderListContainer');
  const openOrderPanelBtn = document.getElementById('openOrderPanelBtn');

  // Helper: Save cart to localStorage (optional but good)
  function saveCart() {
    localStorage.setItem('aliCafeCart', JSON.stringify(cart));
  }

  function loadCart() {
    const saved = localStorage.getItem('aliCafeCart');
    if (saved) {
      cart = JSON.parse(saved);
      updateCartUI();
    }
  }

  // Update cart UI with quantity controls
  function updateCartUI() {
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    cartCountSpan.innerText = totalItems;

    if (cart.length === 0) {
      orderListContainer.innerHTML = '<div class="empty-msg">Cart is empty<br>Add delicious items!</div>';
      saveCart();
      return;
    }

    let html = '';
    let totalPrice = 0;
    cart.forEach((item, idx) => {
      const itemTotal = item.price * item.quantity;
      totalPrice += itemTotal;
      html += `
        <div class="cart-item" data-cart-index="${idx}">
          <div class="cart-item-details">${item.name}</div>
          <div class="cart-item-price">₹${item.price}</div>
          <div class="quantity-controls">
            <button class="qty-btn minus-btn" data-name="${item.name}">−</button>
            <span class="qty-num">${item.quantity}</span>
            <button class="qty-btn plus-btn" data-name="${item.name}">+</button>
          </div>
        </div>
      `;
    });
    html += `<div class="total-row"><span>💰 Total Amount:</span><span>₹${totalPrice}</span></div>`;
    orderListContainer.innerHTML = html;

    // Attach quantity events
    document.querySelectorAll('.plus-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const name = btn.getAttribute('data-name');
        updateQuantity(name, 1);
      });
    });
    document.querySelectorAll('.minus-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const name = btn.getAttribute('data-name');
        updateQuantity(name, -1);
      });
    });
    saveCart();
  }

  function updateQuantity(itemName, delta) {
    const existing = cart.find(i => i.name === itemName);
    if (existing) {
      const newQty = existing.quantity + delta;
      if (newQty <= 0) {
        cart = cart.filter(i => i.name !== itemName);
      } else {
        existing.quantity = newQty;
      }
      updateCartUI();
    }
  }

  function addToCart(itemName, itemPrice) {
    const existing = cart.find(i => i.name === itemName);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ name: itemName, price: itemPrice, quantity: 1 });
    }
    updateCartUI();
    // Flash feedback
    const badge = openOrderPanelBtn;
    badge.style.transform = 'scale(1.1)';
    setTimeout(() => badge.style.transform = '', 200);
  }

  // RENDER MENU with smart ordering: selected category items on TOP
  function renderMenu() {
    const selectedCat = categorySelect.value;
    const searchTerm = searchInput.value.toLowerCase().trim();

    // Update banner text
    let displayCat = selectedCat === 'all' ? 'All Items' : selectedCat;
    selectedCategorySpan.innerText = displayCat;

    // Filter items based on search & category (category filter: we still filter but ordering is separate)
    let filteredItems = menuData.filter(item => {
      const matchesSearch = searchTerm === '' || item.name.toLowerCase().includes(searchTerm);
      const matchesCategory = (selectedCat === 'all') || (item.category === selectedCat);
      return matchesSearch && matchesCategory;
    });

    // If category is not 'all', we sort: selected category first, then others that match search
    let orderedItems = [...filteredItems];
    if (selectedCat !== 'all') {
      // separate: same category items first, then others (but others already filtered by category so only same cat remains)
      // Actually filteredItems already only contains selected category if selectedCat !== 'all'
      // but we still keep order: no extra sorting needed.
    } else {
      // For 'all' with search, keep original order
    }

    // Group by section (Beverages, Snacks & Desserts) but within each section, we need custom order: selected category items first
    const beveragesItems = orderedItems.filter(i => i.section === 'Beverages');
    const snacksItems = orderedItems.filter(i => i.section === 'Snacks & Desserts');

    // Function to sort items within a group: put selected category items at top
    function sortBySelectedCategory(items, selectedCat) {
      if (selectedCat === 'all') return items;
      return items.sort((a, b) => {
        const aIsSelected = a.category === selectedCat;
        const bIsSelected = b.category === selectedCat;
        if (aIsSelected && !bIsSelected) return -1;
        if (!aIsSelected && bIsSelected) return 1;
        return 0;
      });
    }

    const sortedBev = sortBySelectedCategory(beveragesItems, selectedCat);
    const sortedSnacks = sortBySelectedCategory(snacksItems, selectedCat);

    // Group by category inside each section for display
    function buildSectionHTML(items, sectionTitle, sectionIcon) {
      if (items.length === 0) return '';
      
      // Group items by category
      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      let html = `<div class="menu-section">
        <h2 class="section-title">${sectionIcon} ${sectionTitle}</h2>`;
      
      for (const [catName, catItems] of Object.entries(grouped)) {
        const catImage = getCategoryImage(catName);
        html += `<div class="category-group" data-category="${catName}">
          <h3>${catName}</h3>
          <img src="${catImage}" loading="lazy" class="food-image category-image" alt="${catName}">
        `;
        catItems.forEach(item => {
          html += `
            <div class="menu-item" data-name="${item.name}" data-price="${item.price}">
              <div class="item-info">
                <span class="item-name">${item.name}</span>
                <span class="price">₹${item.price}</span>
              </div>
              <button class="add-to-cart">+ Add</button>
            </div>
          `;
        });
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }

    let finalHTML = '';
    if (sortedBev.length > 0) finalHTML += buildSectionHTML(sortedBev, 'Beverages', '☕');
    if (sortedSnacks.length > 0) finalHTML += buildSectionHTML(sortedSnacks, 'Snacks & Desserts', '🍔');
    
    if (finalHTML === '') {
      finalHTML = `<div style="text-align:center; padding:40px; background:white; border-radius:25px;">🍽️ No items match your search or category. Try something else!</div>`;
    }
    
    menuContainer.innerHTML = finalHTML;
    
    // Re-attach add to cart events
    document.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.removeEventListener('click', addHandler);
      btn.addEventListener('click', addHandler);
    });
  }

  function addHandler(e) {
    const menuItem = this.closest('.menu-item');
    if (menuItem) {
      const name = menuItem.getAttribute('data-name');
      const price = parseInt(menuItem.getAttribute('data-price'));
      if (name && price) {
        addToCart(name, price);
      }
    }
  }

  // Filter event handlers
  function handleFilter() {
    renderMenu();
  }

  categorySelect.addEventListener('change', handleFilter);
  searchInput.addEventListener('input', handleFilter);

  // Order panel toggle
  const orderPanel = document.getElementById('orderPanel');
  const toggleBtn = document.getElementById('toggleOrderPanel');
  
  function togglePanel() {
    if (orderPanel.style.transform === 'scale(0.95)' || !orderPanel.style.transform) {
      orderPanel.style.transform = 'scale(1)';
      orderPanel.style.opacity = '1';
      orderPanel.style.visibility = 'visible';
      orderPanel.style.display = 'block';
    } else {
      orderPanel.style.transform = 'scale(0.95)';
      orderPanel.style.opacity = '0';
      orderPanel.style.visibility = 'hidden';
      setTimeout(() => {
        if (orderPanel.style.opacity === '0') orderPanel.style.display = 'none';
      }, 200);
    }
  }
  
  function showPanel() {
    orderPanel.style.display = 'block';
    setTimeout(() => {
      orderPanel.style.transform = 'scale(1)';
      orderPanel.style.opacity = '1';
      orderPanel.style.visibility = 'visible';
    }, 10);
  }
  
  toggleBtn.addEventListener('click', togglePanel);
  openOrderPanelBtn.addEventListener('click', (e) => { e.preventDefault(); showPanel(); });
  
  orderPanel.style.transform = 'scale(0.95)';
  orderPanel.style.opacity = '0';
  orderPanel.style.visibility = 'hidden';
  orderPanel.style.display = 'none';
  orderPanel.style.transition = '0.2s ease';

  // Glow effect for menu sections (delegated)
  document.addEventListener('mousemove', (e) => {
    const sections = document.querySelectorAll('.menu-section');
    sections.forEach(section => {
      const rect = section.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        section.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.95), rgba(255,255,255,0.65))`;
      } else {
        section.style.background = "rgba(255,255,255,0.7)";
      }
    });
  });

  // Top button
  const topBtn = document.getElementById("topBtn");
  window.addEventListener("scroll", () => {
    if (window.scrollY > 300) topBtn.classList.add("show");
    else topBtn.classList.remove("show");
  });
  topBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  // Initial load
  loadCart();
  renderMenu();
  updateCartUI();
</script>
</body>
</html>
